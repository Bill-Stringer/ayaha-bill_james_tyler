<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio Elite HD-P Reference</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: #111;
      color: #f5f5f5;
    }

    header {
      padding: 28px 18px 18px;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.03em;
    }

    p {
      color: #cfcfcf;
      font-size: 14px;
      line-height: 1.7;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      padding: 18px;
      max-width: 1200px;
      margin: 0 auto 40px;
    }

    .card {
      background: #1b1b1b;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .card img {
      width: 100%;
      display: block;
    }

    .caption {
      padding: 10px 14px 14px;
      font-size: 13px;
      color: #d7d7d7;
    }

    a {
      color: inherit;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Studio Elite HD-P Quilted Maple Top Reference</h1>
    <p>彩葉ちゃんとBill Stringerのギター生成用参考資料。<br>
    Transparent Blue Burst、2ハム、キルトメイプルトップ、バインディング、Rear Rout系の外観確認用。</p>
  </header>

  <main class="gallery">
    <div class="card">
      <a href="01.jpeg"><img src="01.jpeg" alt="Studio Elite HD-P reference 01"></a>
      <div class="caption">01 / Full view</div>
    </div>

    <div class="card">
      <a href="02.jpeg"><img src="02.jpeg" alt="Studio Elite HD-P reference 02"></a>
      <div class="caption">02 / Body front</div>
    </div>

    <div class="card">
      <a href="03.jpeg"><img src="03.jpeg" alt="Studio Elite HD-P reference 03"></a>
      <div class="caption">03 / Pickups and quilted top</div>
    </div>

    <div class="card">
      <a href="04.jpeg"><img src="04.jpeg" alt="Studio Elite HD-P reference 04"></a>
      <div class="caption">04 / Upper body and neck</div>
    </div>

    <div class="card">
      <a href="05.jpeg"><img src="05.jpeg" alt="Studio Elite HD-P reference 05"></a>
      <div class="caption">05 / Headstock</div>
    </div>

    <div class="card">
      <a href="06.jpeg"><img src="06.jpeg" alt="Studio Elite HD-P reference 06"></a>
      <div class="caption">06 / Back body</div>
    </div>

    <div class="card">
      <a href="07.jpeg"><img src="07.jpeg" alt="Studio Elite HD-P reference 07"></a>
      <div class="caption">07 / Back full view</div>
    </div>
  </main>
</body>
</html>
